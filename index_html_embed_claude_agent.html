<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivendo Em Terapia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      height: 70px;
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 1.3rem;
      font-weight: bold;
      color: #38bdf8;
    }

    .btn {
      background: linear-gradient(135deg, #38bdf8, #06b6d4);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 70px);
      margin-top: 70px;
      border: none;
      background: white;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 0 15px;
      }

      .logo {
        font-size: 1rem;
      }

      .btn {
        padding: 10px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">Vivendo Em Terapia</div>

    <a 
      class="btn" 
      href="https://kiwify.com.br"
      target="_blank"
    >
      Comprar Agora
    </a>
  </div>

  <iframe
    src="https://claude.ai/public/artifacts/3b24c38e-396c-4f7b-b641-b7b3b710c5c9"
    allowfullscreen
  ></iframe>

</body>
</html>
